<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="padding: 16px;">
    <div style="display: flex; flex-direction: column; gap: 8px; background-color: #5F9EA0; width: 70px; height: 800px;">
        <button class="btn"
        style="background-color: #5F9EA0; width: 60px;"
        data-bs-toggle="offcanvas"
        data-bs-target="#sidebar"><img style="width: 30px;" src="../../public/assets/menu-icon.png" alt="Ícone de Menu"></button>
        <img style="width: 60px; height: 60px;" src="../../public/assets/white-dashboard-icon.png" alt="">
        <img style="width: 60px; height: 60px;" src="../../public/assets/white-category-icon.png" alt="">
        <img style="width: 60px; height: 60px;" src="../../public/assets/white-transaction-icon.png" alt="">
    </div>
        
    <div class="offcanvas offcanvas-start"
    style="background-color: #5F9EA0;"
    tabindex="-1"
     id="sidebar">

        <div class="offcanvas-header">
            <h5 class="offcanvas-title" style="color: white;">TargetFinance</h5>
            <button type="button"
                    class="btn-close btn-close-white"
                    data-bs-dismiss="offcanvas"></button>
        </div>

        <div class="offcanvas-body">

            <ul class="nav flex-column">
                <li 
                    class="nav-item"
                    style="display:flex; align-items:center; padding: 8px; border-radius: 10px;"
                    onmouseover="this.style.backgroundColor='rgba(114, 205, 208, 0.466)'"
                    onmouseout="this.style.backgroundColor=''"
                    >
                    <img style="width: 30px; height: 30px;" src="../../public/assets/white-dashboard-icon.png" alt="">
                    <a class="nav-link text-white" style="font-size: 20px;" href="#">
                    Dashboard
                    </a>
                </li>
                <li 
                    class="nav-item"
                    style="display:flex; align-items:center; padding: 8px; border-radius: 10px;"
                    onmouseover="this.style.backgroundColor='rgba(114, 205, 208, 0.466)'"
                    onmouseout="this.style.backgroundColor=''"
                    >
                    <img style="width: 30px; height: 30px;" src="../../public/assets/white-category-icon.png" alt="">
                    <a class="nav-link text-white" style="font-size: 20px;" href="#">
                    Categorias
                    </a>
                </li>
                <li 
                    class="nav-item"
                    style="display:flex; align-items:center; padding: 8px; border-radius: 10px;"
                    onmouseover="this.style.backgroundColor='rgba(114, 205, 208, 0.466)'"
                    onmouseout="this.style.backgroundColor=''"
                    >
                    <img style="width: 30px; height: 30px;" src="../../public/assets/white-transaction-icon.png" alt="">
                    <a class="nav-link text-white" style="font-size: 20px;" href="#">
                    Transações
                    </a>
                </li>
            </ul>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
